project_name: spring-cli

builds:
  - id: spring-cli
    main: ./main.go
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    binary: spring-cli

archives:
  - id: archive
    builds:
      - spring-cli
    format: tar.gz
    files:
      - README.md
      - LICENSE

release:
  github:
    owner: TALLHAMADOU
    name: spring-boot-cli
