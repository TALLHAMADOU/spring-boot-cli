project_name: spring-cli

builds:
  - id: spring-cli
    main: ./main.go
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
    binary: spring-cli

archives:
  - id: archive
    builds:
      - spring-cli
    format: tar.gz
    files:
      - README.md
      - LICENSE

release:
  github:
    # Replace these values with your GitHub repo owner/name before running goreleaser
    # e.g. owner: hunter
    #       name: Spring-CLi
    owner: replace-with-owner
    name: replace-with-repo
